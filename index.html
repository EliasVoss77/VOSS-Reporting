  if (!currentUser) return;
  
  try {

      .from('profiles')
      .select('plan, report_count_today, report_count_reset')
      .eq('id', currentUser.id)
      .single();

    if (data) {

      const today = new Date().toISOString().split('T')[0];

        reportsToday = 0;

          report_count_reset: today 
        }).eq('id', currentUser.id);
      } else {
        reportsToday = data.report_count_today || 0;

  // Special override for you

}

function updatePlanUI() {
  const badge = document.getElementById('user-plan-badge');
  const upgradeBanner = document.getElementById('upgrade-banner');
  const historyLock = document.getElementById('history-lock');
  const historySection = document.getElementById('report-log-section');

  if (userPlan === 'pro') {
    badge.textContent = 'PRO';
    badge.className = 'user-plan pro';
    upgradeBanner.style.display = 'none';
    historyLock.style.display = 'none';
    historySection.style.display = 'block';
  } else {
    const remaining = Math.max(0, FREE_LIMIT - reportsToday);

    upgradeBanner.style.display = 'block';
    historyLock.style.display = 'block';
    historySection.style.display = 'none';

}

}

  if (!currentUser || userPlan === 'pro') return;
  
  reportsToday++;
  const today = new Date().toISOString().split('T')[0];
  
  await sb.from('profiles').update({
    report_count_today: reportsToday,
    report_count_reset: today
  }).eq('id', currentUser.id);
  
  updatePlanUI();
}
