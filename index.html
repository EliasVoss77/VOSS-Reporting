<!DOCTYPE html>
<html>
<head>
<title>VOSS Reporting Dashboard</title>
<style>
body {
font-family: Arial, sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.card {
background:#1e293b;
padding:20px;
margin:20px;
border-radius:10px;
display:inline-block;
width:250px;
}

h1 {
margin-bottom:40px;
}
</style>
</head>

<body>

<h1>VOSS Reporting Dashboard</h1>
<p>Virtual Operating System Synopsis Reporting</p>

<div class="card">
<h2>Total Reports</h2>
<p id="reports">0</p>
</div>

<div class="card">
<h2>Total Time Saved</h2>
<p id="time">0 hrs</p>
</div>

<div class="card">
<h2>Estimated Value</h2>
<p id="value">$0</p>
</div>

</body>
</html>
